<!-- ===== LOGIN SCREEN ===== -->
<div class="login-screen" v-if="!isLoggedIn">
  <div class="login-particles">
    <span></span><span></span><span></span>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon"><i class="fas fa-hospital-user"></i></div>
      <h2>ប្រព័ន្ធគ្រប់គ្រងអ្នកជំងឺ</h2>
      <p>បន្ទប់ពិគ្រោះ និងព្យាបាលជំងឺ · ឡាមស៊ីលីន</p>
    </div>

    <!-- Tabs: Login / Register -->
    <div style="display:flex;gap:8px;margin-bottom:20px;background:rgba(255,255,255,.06);border-radius:12px;padding:4px">
      <button @click="authMode='login'" :class="{'active-tab':authMode==='login'}" 
        style="flex:1;padding:10px;border:none;border-radius:8px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;transition:.2s;background:authMode==='login'?'rgba(13,148,136,.4)':'transparent';color:authMode==='login'?'white':'rgba(255,255,255,.5)'">
        <i class="fas fa-sign-in-alt"></i> ចូលប្រព័ន្ធ
      </button>
      <button @click="authMode='register'" :class="{'active-tab':authMode==='register'}"
        style="flex:1;padding:10px;border:none;border-radius:8px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;transition:.2s;background:authMode==='register'?'rgba(13,148,136,.4)':'transparent';color:authMode==='register'?'white':'rgba(255,255,255,.5)'">
        <i class="fas fa-user-plus"></i> ចុះឈ្មោះ
      </button>
    </div>

    <!-- ===== LOGIN FORM ===== -->
    <div v-if="authMode==='login'">
      <div class="login-field">
        <label>ឈ្មោះអ្នកប្រើ / អ៊ីមែល</label>
        <input v-model="loginUsername" placeholder="admin / email@example.com" @keyup.enter="login"/>
        <i class="fas fa-user fi"></i>
      </div>
      <div class="login-field">
        <label>ពាក្យសម្ងាត់</label>
        <input v-model="loginPassword" type="password" placeholder="••••••••" @keyup.enter="login"/>
        <i class="fas fa-lock fi"></i>
      </div>
      <div class="login-err" v-if="loginError">
        <i class="fas fa-exclamation-circle"></i> {{ loginError }}
      </div>
      <button class="btn-login" @click="login">
        <i class="fas fa-sign-in-alt"></i> ចូលប្រព័ន្ធ
      </button>
    </div>

    <!-- ===== REGISTER FORM ===== -->
    <div v-if="authMode==='register'">
      <div class="login-field">
        <label>ឈ្មោះពេញ <span style="color:#ef4444">*</span></label>
        <input v-model="registerData.fullName" placeholder="ឧ. ឡាម ស៊ីលីន"/>
        <i class="fas fa-user fi"></i>
      </div>
      <div class="login-field">
        <label>អ៊ីមែល <span style="color:#ef4444">*</span></label>
        <input v-model="registerData.email" type="email" placeholder="email@example.com"/>
        <i class="fas fa-envelope fi"></i>
      </div>
      <div class="login-field">
        <label>ពាក្យសម្ងាត់ <span style="color:#ef4444">*</span></label>
        <input v-model="registerData.password" type="password" placeholder="យ៉ាងហោច ៦ តួ"/>
        <i class="fas fa-lock fi"></i>
      </div>
      <div class="login-field">
        <label>បញ្ជាក់ពាក្យសម្ងាត់ <span style="color:#ef4444">*</span></label>
        <input v-model="registerData.confirmPassword" type="password" placeholder="បញ្ចូលម្តងទៀត"/>
        <i class="fas fa-check-circle fi"></i>
      </div>
      <div class="login-field">
        <label>តួនាទី <span style="color:#ef4444">*</span></label>
        <select v-model="registerData.role" style="width:100%;padding:13px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:white;font-size:14px;font-family:inherit;outline:none;">
          <option value="doctor" style="color:#1e293b">គ្រូពេទ្យ (Doctor)</option>
          <option value="nurse" style="color:#1e293b">គិលានុបដ្ឋាយិកា (Nurse)</option>
          <option value="admin" style="color:#1e293b">អ្នកគ្រប់គ្រង (Admin)</option>
        </select>
      </div>
      <div class="login-err" v-if="registerError">
        <i class="fas fa-exclamation-circle"></i> {{ registerError }}
      </div>
      <div class="login-err" v-if="registerSuccess" style="background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:#6ee7b7">
        <i class="fas fa-check-circle"></i> {{ registerSuccess }}
      </div>
      <button class="btn-login" @click="register" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)">
        <i class="fas fa-user-plus"></i> ចុះឈ្មោះ
      </button>
      <p style="text-align:center;margin-top:14px;color:rgba(255,255,255,.4);font-size:12px">
        មានគណនីរួចហើយ? 
        <a href="#" @click.prevent="authMode='login'" style="color:var(--teal-light);text-decoration:none;font-weight:700">ចុចចូល</a>
      </p>
    </div>

    <!-- Demo Credentials -->
    <div style="margin-top:20px;padding:14px;background:rgba(255,255,255,.05);border-radius:10px;border:1px solid rgba(255,255,255,.08)">
      <p style="color:rgba(255,255,255,.4);font-size:12px;text-align:center;margin-bottom:6px">
        <i class="fas fa-info-circle"></i> គណនីសាកល្បង
      </p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;color:rgba(255,255,255,.5)">
        <div>👤 admin / admin123</div>
        <div>👨‍⚕️ doctor / doctor123</div>
        <div>👩‍⚕️ nurse / nurse123</div>
        <div style="color:rgba(255,255,255,.3);font-size:11px;grid-column:1/-1;text-align:center">(ចុចចូលប្រើភ្លាម)</div>
      </div>
    </div>
  </div>
</div>/* បន្ថែមនៅក្នុង <style> */
.active-tab {
  background: rgba(13, 148, 136, 0.4) !important;
  color: white !important;
}data() {
  return {
    // ... existing data
    authMode: 'login', // 'login' | 'register'
    registerData: {
      fullName: '',
      email: '',
      password: '',
      confirmPassword: '',
      role: 'doctor'
    },
    registerError: '',
    registerSuccess: '',
    users: [], // list of registered users
    currentUser: null, // full user object
    currentUserRole: '', // 'admin' | 'doctor' | 'nurse'
    // ... rest of data
  }
}
  methods: {
  login() {
    this.loginError = '';
    
    // 1. ពិនិត្យមើលគណនីក្នុងប្រព័ន្ធ
    const user = this.users.find(u => 
      (u.username === this.loginUsername || u.email === this.loginUsername) &&
      u.password === this.loginPassword
    );
    
    if (user) {
      this.isLoggedIn = true;
      this.currentUser = user;
      this.currentUserRole = user.role;
      
      // Load data based on role
      this.loadPatients();
      this.loadBloodTests();
      this.loadPrescriptions();
      this.loadInvoices();
      this.initFirebaseSync();
      
      this.showSuccess('សួស្តី ' + user.fullName + '!');
    } else {
      // ពិនិត្យគណនី default
      if (this.loginUsername === 'admin' && this.loginPassword === 'admin123') {
        this.isLoggedIn = true;
        this.currentUser = { username: 'admin', fullName: 'Administrator', role: 'admin' };
        this.currentUserRole = 'admin';
        this.loadPatients();
        this.loadBloodTests();
        this.loadPrescriptions();
        this.loadInvoices();
        this.initFirebaseSync();
        this.showSuccess('សួស្តី Administrator!');
      } else {
        this.loginError = 'ឈ្មោះអ្នកប្រើ ឬពាក្យសម្ងាត់មិនត្រឹមត្រូវ!';
      }
    }
  },
  
  register() {
    this.registerError = '';
    this.registerSuccess = '';
    
    // Validation
    if (!this.registerData.fullName.trim()) {
      this.registerError = 'សូមបំពេញឈ្មោះពេញ';
      return;
    }
    if (!this.registerData.email.trim() || !this.registerData.email.includes('@')) {
      this.registerError = 'សូមបំពេញអ៊ីមែលឱ្យបានត្រឹមត្រូវ';
      return;
    }
    if (this.registerData.password.length < 6) {
      this.registerError = 'ពាក្យសម្ងាត់ត្រូវមានយ៉ាងហោច ៦ តួ';
      return;
    }
    if (this.registerData.password !== this.registerData.confirmPassword) {
      this.registerError = 'ពាក្យសម្ងាត់មិនត្រូវគ្នា';
      return;
    }
    
    // Check if email already exists
    if (this.users.find(u => u.email === this.registerData.email)) {
      this.registerError = 'អ៊ីមែលនេះត្រូវបានចុះឈ្មោះរួចហើយ';
      return;
    }
    
    // Create new user
    const newUser = {
      id: 'U-' + Date.now().toString().slice(-6),
      username: this.registerData.email.split('@')[0],
      email: this.registerData.email,
      password: this.registerData.password,
      fullName: this.registerData.fullName,
      role: this.registerData.role,
      createdAt: new Date().toISOString()
    };
    
    this.users.push(newUser);
    this.saveUsers();
    
    this.registerSuccess = 'ចុះឈ្មោះជោគជ័យ! សូមចូលប្រព័ន្ធឥឡូវនេះ';
    this.registerData = { fullName: '', email: '', password: '', confirmPassword: '', role: 'doctor' };
    
    // Auto switch to login after 2 seconds
    setTimeout(() => {
      this.authMode = 'login';
      this.registerSuccess = '';
    }, 2000);
  },
  
  loadUsers() {
    try {
      const data = localStorage.getItem('clinicUsers_v1');
      this.users = data ? JSON.parse(data) : [];
    } catch(e) {
      this.users = [];
    }
  },
  
  saveUsers() {
    localStorage.setItem('clinicUsers_v1', JSON.stringify(this.users));
    this.pushDataToFirebase();
  },
  
  logout() {
    if (!confirm('តើអ្នកពិតជាចង់ចាកចេញមែនទេ?')) return;
    
    if (this.currentUser) {
      db.ref('live_sync/' + this.currentUser.username).remove();
      db.ref('live_sync/' + this.currentUser.username).off();
    }
    
    this.isLoggedIn = false;
    this.currentUser = null;
    this.currentUserRole = '';
    this.loginUsername = '';
    this.loginPassword = '';
    this.patients = [];
    this.bloodTests = [];
    this.prescriptions = [];
    this.invoices = [];
  }
}
computed: {
  // ... existing computed
  
  canEdit() {
    return this.currentUserRole === 'admin' || this.currentUserRole === 'doctor';
  },
  
  canDelete() {
    return this.currentUserRole === 'admin';
  },
  
  canViewAll() {
    return this.currentUserRole === 'admin';
  },
  
  canManageUsers() {
    return this.currentUserRole === 'admin';
    
  }
}
    <!-- លាក់ប៊ូតុងលុបសម្រាប់អ្នកប្រើដែលមិនមែន Admin -->
<button v-if="canDelete" class="btn btn-danger btn-xs" @click="deletePatient(...)">
  <i class="fas fa-trash"></i> លុប
</button>

<!-- បង្ហាញតែ Admin ប៉ុណ្ណោះ -->

  <div class="card-header">
    <h2>គ្រប់គ្រងអ្នកប្រើ</h2>
  </div>
  <div class="card-body">
    <table>...</table>
  </div>
</div>

<!-- បង្ហាញឈ្មោះអ្នកប្រើ និងតួនាទីក្នុង Top Bar -->
<div class="top-bar-user">
  <div class="user-chip">
    <i class="fas fa-user-md"></i>
    <span>{{ currentUser.fullName || currentUser }}</span>
    <span style="font-size:10px;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:99px;margin-left:4px">
      {{ currentUserRole === 'admin' ? 'Admin' : currentUserRole === 'doctor' ? 'គ្រូពេទ្យ' : 'គិលានុបដ្ឋាយិកា' }}
    </span>
  </div>
  <button class="btn btn-danger btn-sm" @click="logout">
    <i class="fas fa-sign-out-alt"></i> ចាកចេញ
  </button>
</div>
    // ក្នុង mounted() ឬ created()
mounted() {
  this.loadUsers();
  
  // បើគ្មានអ្នកប្រើ បង្កើតគណនីសាកល្បង
  if (this.users.length === 0) {
    this.users = [
      { id: 'U-000001', username: 'admin', email: 'admin@clinic.com', password: 'admin123', fullName: 'Administrator', role: 'admin', createdAt: new Date().toISOString() },
      { id: 'U-000002', username: 'doctor', email: 'doctor@clinic.com', password: 'doctor123', fullName: 'ឡាម ស៊ីលីន', role: 'doctor', createdAt: new Date().toISOString() },
      { id: 'U-000003', username: 'nurse', email: 'nurse@clinic.com', password: 'nurse123', fullName: 'សុខ សម្បត្តិ', role: 'nurse', createdAt: new Date().toISOString() }
    ];
    this.saveUsers();
  }
}pushDataToFirebase() {
  if (this.isSyncingFromCloud || !this.currentUser) return;
  
  db.ref('live_sync/' + this.currentUser.username).set({
    patients: this.patients,
    bloodTests: this.bloodTests,
    prescriptions: this.prescriptions,
    invoices: this.invoices,
    users: this.users // <-- បន្ថែម
  });
}
